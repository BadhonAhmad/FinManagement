server:
  port: 8080

spring:
  datasource:
    url: jdbc:sqlite::memory:
    driver-class-name: org.sqlite.JDBC
  jpa:
    database-platform: org.hibernate.community.dialect.SQLiteDialect
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    open-in-view: false
  jackson:
    serialization:
      write-dates-as-timestamps: false

app:
  jwt:
    secret: Y2hhbmdlLXRoaXMtdG8tYS1sb25nLXNlY3JldC1rZXktZm9yLXByb2R1Y3Rpb24tYXQtbGVhc3QtMjU2LWJpdHM=
    expiration-ms: 3600000
  rate-limit:
    requests-per-minute: 100

springdoc:
  api-docs:
    enabled: false
