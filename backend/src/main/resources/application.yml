server:
  port: 8080

spring:
  datasource:
    url: jdbc:sqlite:${APP_DB_PATH:./finmanagement.db}
    driver-class-name: org.sqlite.JDBC
  jpa:
    database-platform: org.hibernate.community.dialect.SQLiteDialect
    hibernate:
      ddl-auto: update
    show-sql: false
    open-in-view: false
  jackson:
    serialization:
      write-dates-as-timestamps: false
    default-property-inclusion: non_null

app:
  jwt:
    secret: Y2hhbmdlLXRoaXMtdG8tYS1sb25nLXNlY3JldC1rZXktZm9yLXByb2R1Y3Rpb24tYXQtbGVhc3QtMjU2LWJpdHM=
    expiration-ms: 86400000
  rate-limit:
    requests-per-minute: 60

springdoc:
  api-docs:
    path: /api/docs
  swagger-ui:
    path: /api/swagger-ui.html
